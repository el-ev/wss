@function --mhalf(--byte <number>) returns <integer> { result: round(down, calc(var(--byte) / 2)); }
/*__WSS_KEEP_FN_MHALF_END__*/
/*__WSS_KEEP_FN_MPAR_START__*/
@function --mpar(--byte <number>) returns <integer> { result: mod(var(--byte), 2); }
/*__WSS_KEEP_FN_MPAR_END__*/
/*__WSS_KEEP_FN_MLO_START__*/
@function --mlo(--w <number>) returns <integer> { result: mod(var(--w), 256); }
/*__WSS_KEEP_FN_MLO_END__*/
/*__WSS_KEEP_FN_MHI_START__*/
@function --mhi(--w <number>) returns <integer> { result: mod(round(down, calc(var(--w) / 256)), 256); }
/*__WSS_KEEP_FN_MHI_END__*/
/*__WSS_KEEP_FN_M16_START__*/
@function --m16(--lo <number>, --hi <number>) returns <integer> { result: calc(var(--lo) + 256 * var(--hi)); }
/*__WSS_KEEP_FN_M16_END__*/
/*__WSS_KEEP_FN_MLOAD_START__*/
@function --mload(--byte <number>) returns <integer> { result: calc((--eqz(--mpar(var(--byte)))) * mod(--read_m16(--mhalf(var(--byte))), 256) + (--nez(--mpar(var(--byte)))) * mod(round(down, calc(--read_m16(--mhalf(var(--byte))) / 256)), 256)); }
/*__WSS_KEEP_FN_MLOAD_END__*/
/*__WSS_SUPPORT__*/
</style>
</head>
<body>

<!--__WSS_KEEP_KB_HTML_START__-->
<div class="kb">
    <input type="checkbox" id="shift-toggle" class="shift-state">
    <div class="input-hint" aria-live="polite"></div>
    <div class="row"><button class="key" data-key="27">Esc</button><button class="key dual" data-key="96"><span class="char">`</span><span class="shift-char">~</span></button><button class="key dual" data-key="49"><span class="char">1</span><span class="shift-char">!</span></button><button class="key dual" data-key="50"><span class="char">2</span><span class="shift-char">@</span></button><button class="key dual" data-key="51"><span class="char">3</span><span class="shift-char">#</span></button><button class="key dual" data-key="52"><span class="char">4</span><span class="shift-char">$</span></button><button class="key dual" data-key="53"><span class="char">5</span><span class="shift-char">%</span></button><button class="key dual" data-key="54"><span class="char">6</span><span class="shift-char">^</span></button><button class="key dual" data-key="55"><span class="char">7</span><span class="shift-char">&amp;</span></button><button class="key dual" data-key="56"><span class="char">8</span><span class="shift-char">*</span></button><button class="key dual" data-key="57"><span class="char">9</span><span class="shift-char">(</span></button><button class="key dual" data-key="48"><span class="char">0</span><span class="shift-char">)</span></button><button class="key dual" data-key="45"><span class="char">-</span><span class="shift-char">_</span></button><button class="key dual" data-key="61"><span class="char">=</span><span class="shift-char">+</span></button><button class="key wide" data-key="8">Bksp</button></div>
    <div class="row"><button class="key wide" data-key="9">Tab</button><button class="key dual" data-key="113"><span class="char">q</span><span class="shift-char">Q</span></button><button class="key dual" data-key="119"><span class="char">w</span><span class="shift-char">W</span></button><button class="key dual" data-key="101"><span class="char">e</span><span class="shift-char">E</span></button><button class="key dual" data-key="114"><span class="char">r</span><span class="shift-char">R</span></button><button class="key dual" data-key="116"><span class="char">t</span><span class="shift-char">T</span></button><button class="key dual" data-key="121"><span class="char">y</span><span class="shift-char">Y</span></button><button class="key dual" data-key="117"><span class="char">u</span><span class="shift-char">U</span></button><button class="key dual" data-key="105"><span class="char">i</span><span class="shift-char">I</span></button><button class="key dual" data-key="111"><span class="char">o</span><span class="shift-char">O</span></button><button class="key dual" data-key="112"><span class="char">p</span><span class="shift-char">P</span></button><button class="key dual" data-key="91"><span class="char">[</span><span class="shift-char">{</span></button><button class="key dual" data-key="93"><span class="char">]</span><span class="shift-char">}</span></button><button class="key dual" data-key="92"><span class="char">\</span><span class="shift-char">|</span></button></div>
    <div class="row"><button class="key dual" data-key="97"><span class="char">a</span><span class="shift-char">A</span></button><button class="key dual" data-key="115"><span class="char">s</span><span class="shift-char">S</span></button><button class="key dual" data-key="100"><span class="char">d</span><span class="shift-char">D</span></button><button class="key dual" data-key="102"><span class="char">f</span><span class="shift-char">F</span></button><button class="key dual" data-key="103"><span class="char">g</span><span class="shift-char">G</span></button><button class="key dual" data-key="104"><span class="char">h</span><span class="shift-char">H</span></button><button class="key dual" data-key="106"><span class="char">j</span><span class="shift-char">J</span></button><button class="key dual" data-key="107"><span class="char">k</span><span class="shift-char">K</span></button><button class="key dual" data-key="108"><span class="char">l</span><span class="shift-char">L</span></button><button class="key dual" data-key="59"><span class="char">;</span><span class="shift-char">:</span></button><button class="key dual" data-key="39"><span class="char">'</span><span class="shift-char">"</span></button><button class="key wide" data-key="10">Enter</button></div>
    <div class="row"><label for="shift-toggle" class="shift-label">Shift</label><button class="key dual" data-key="122"><span class="char">z</span><span class="shift-char">Z</span></button><button class="key dual" data-key="120"><span class="char">x</span><span class="shift-char">X</span></button><button class="key dual" data-key="99"><span class="char">c</span><span class="shift-char">C</span></button><button class="key dual" data-key="118"><span class="char">v</span><span class="shift-char">V</span></button><button class="key dual" data-key="98"><span class="char">b</span><span class="shift-char">B</span></button><button class="key dual" data-key="110"><span class="char">n</span><span class="shift-char">N</span></button><button class="key dual" data-key="109"><span class="char">m</span><span class="shift-char">M</span></button><button class="key dual" data-key="44"><span class="char">,</span><span class="shift-char">&lt;</span></button><button class="key dual" data-key="46"><span class="char">.</span><span class="shift-char">&gt;</span></button><button class="key dual" data-key="47"><span class="char">/</span><span class="shift-char">?</span></button></div>
    <div class="row"><button class="key space" data-key="32">Space</button></div>
</div>
<!--__WSS_KEEP_KB_HTML_END__-->
<div class="inds" aria-live="off">

    <!--__WSS_KEEP_SP_INDICATOR_HTML_START__-->

<!--__WSS_KEEP_CS_VISUALIZER_HTML_START__-->

<!--__WSS_KEEP_CS_VISUALIZER_HTML_END__-->
<!--__WSS_KEEP_MEM_VISUALIZER_HTML_START__-->

<!--__WSS_KEEP_MEM_VISUALIZER_HTML_END__-->

<!--__WSS_KEEP_JS_CLOCK_RUNTIME_START__-->
<script>
(() => {
    const clkEl = document.querySelector(".clk");
    const terminalEl = document.querySelector(".terminal");
    const screenEl = document.querySelector(".screen");
    if (!clkEl || !terminalEl || !screenEl) return;
    const jsClockEnabled = __WSS_JS_CLOCK_ENABLED__;
    const jsClockDebuggerEnabled = __WSS_JS_CLOCK_DEBUGGER_ENABLED__;
    /*__WSS_KEEP_JS_COPROCESSOR_RUNTIME_START__*/
    const jsCoprocessorEnabled = __WSS_JS_COPROCESSOR_ENABLED__;
    /*__WSS_KEEP_JS_COPROCESSOR_RUNTIME_END__*/
    if (!jsClockEnabled) return;

    let clock = 0;
    const phasesPerInstruction = 4;
    const terminalPcs = new Set([-1, -2, -3, -4, -5]);
    const followSlackPx = 4;
    const minSpeedMultiplier = 0.25;
    const maxSpeedMultiplier = 16;
    let followScreenBottom = true;
    let speedMultiplier = 1;
    let speedCarry = 0;
    let pendingStepCount = 0;
    let paused = jsClockDebuggerEnabled;
    let halted = false;
    let animationPending = false;
    let debugRunBtn = null;
    let debugStepBtn = null;
    let debugSpeedOut = null;
    let debugStateOut = null;
    let debugPcOut = null;
    let debugClockOut = null;

    function isNearScreenBottom() {
        return screenEl.scrollHeight - screenEl.clientHeight - screenEl.scrollTop <= followSlackPx;
    }

    function scrollScreenToBottom() {
        screenEl.scrollTop = screenEl.scrollHeight;
    }

    screenEl.addEventListener(
        "scroll",
        () => {
            followScreenBottom = isNearScreenBottom();
        },
        { passive: true }
    );

    function readIntStyle(style, name, fallback = 0) {
        const parsed = Number.parseInt(style.getPropertyValue(name), 10);
        if (Number.isNaN(parsed)) return fallback;
        return parsed;
    }

    function formatSpeedLabel(value) {
        const rounded = Math.round(value * 100) / 100;
        return `${rounded.toFixed(rounded % 1 === 0 ? 0 : 2)}x`;
    }

    function readPc(style) {
        return readIntStyle(style, "--pc", readIntStyle(style, "--_1pc", 0));
    }

    function refreshDebuggerLabels(style) {
        if (!jsClockDebuggerEnabled || !debugStateOut) return;
        const pc = readPc(style);
        debugStateOut.textContent = halted ? "halted" : paused ? "paused" : "running";
        debugPcOut.textContent = Number.isNaN(pc) ? "?" : String(pc);
        debugClockOut.textContent = String(clock);
        if (debugRunBtn) {
            debugRunBtn.textContent = paused ? "Run" : "Pause";
        }
        if (debugStepBtn) {
            debugStepBtn.disabled = halted || !paused;
        }
        if (debugSpeedOut) {
            debugSpeedOut.textContent = formatSpeedLabel(speedMultiplier);
        }
    }

    function scheduleAnimation() {
        if (animationPending || halted) return;
        animationPending = true;
        requestAnimationFrame(animate);
    }

    /*__WSS_KEEP_JS_COPROCESSOR_RUNTIME_START__*/
    function readByteStyle(style, name) {
        return readIntStyle(style, name, 0) & 0xff;
    }

    function readCopWord(style, prefix) {
        return (
            readByteStyle(style, `${prefix}0`) |
            (readByteStyle(style, `${prefix}1`) << 8) |
            (readByteStyle(style, `${prefix}2`) << 16) |
            (readByteStyle(style, `${prefix}3`) << 24)
        ) >>> 0;
    }

    function writeCopOutputBytes(b0, b1, b2, b3) {
        terminalEl.style.setProperty("--cop_o0", String(b0), "important");
        terminalEl.style.setProperty("--cop_o1", String(b1), "important");
        terminalEl.style.setProperty("--cop_o2", String(b2), "important");
        terminalEl.style.setProperty("--cop_o3", String(b3), "important");
    }

    function writeCopOutputWord(value) {
        const word = value >>> 0;
        writeCopOutputBytes(word & 0xff, (word >>> 8) & 0xff, (word >>> 16) & 0xff, (word >>> 24) & 0xff);
    }

    function popcnt32(value) {
        let v = value >>> 0;
        let count = 0;
        while (v !== 0) {
            v &= v - 1;
            count++;
        }
        return count >>> 0;
    }

    function runCoprocessor(style) {
        if (!jsCoprocessorEnabled) return;
        const op = readIntStyle(style, "--cop_op", 0);
        if (op === 0) {
            writeCopOutputWord(0);
            return;
        }

        const lhsU = readCopWord(style, "--cop_a");
        const rhsU = readCopWord(style, "--cop_b");
        const lhsS = lhsU | 0;
        const rhsS = rhsU | 0;

        switch (op) {
            case 1: // div_u32
                if (rhsU === 0) {
                    writeCopOutputBytes(-1, 0, 0, 0);
                    return;
                }
                writeCopOutputWord(Math.trunc(lhsU / rhsU));
                return;
            case 2: // rem_u32
                if (rhsU === 0) {
                    writeCopOutputBytes(-1, 0, 0, 0);
                    return;
                }
                writeCopOutputWord(lhsU % rhsU);
                return;
            case 3: // div_s32
                if (rhsU === 0) {
                    writeCopOutputBytes(-1, 0, 0, 0);
                    return;
                }
                writeCopOutputWord((lhsS / rhsS) | 0);
                return;
            case 4: // rem_s32
                if (rhsU === 0) {
                    writeCopOutputBytes(-1, 0, 0, 0);
                    return;
                }
                writeCopOutputWord((lhsS % rhsS) | 0);
                return;
            case 5: { // shl_32
                const shift = rhsU & 31;
                writeCopOutputWord(lhsU << shift);
                return;
            }
            case 6: { // shr_u32
                const shift = rhsU & 31;
                writeCopOutputWord(lhsU >>> shift);
                return;
            }
            case 7: { // shr_s32
                const shift = rhsU & 31;
                writeCopOutputWord(lhsS >> shift);
                return;
            }
            case 8: { // rotl_32
                const shift = rhsU & 31;
                writeCopOutputWord((lhsU << shift) | (lhsU >>> ((32 - shift) & 31)));
                return;
            }
            case 9: { // rotr_32
                const shift = rhsU & 31;
                writeCopOutputWord((lhsU >>> shift) | (lhsU << ((32 - shift) & 31)));
                return;
            }
            case 10: // clz_32
                writeCopOutputWord(Math.clz32(lhsU));
                return;
            case 11: // ctz_32
                writeCopOutputWord(lhsU === 0 ? 32 : (31 - Math.clz32((lhsU & -lhsU) >>> 0)));
                return;
            case 12: // popcnt_32
                writeCopOutputWord(popcnt32(lhsU));
                return;
            default:
                writeCopOutputWord(0);
        }
    }
    /*__WSS_KEEP_JS_COPROCESSOR_RUNTIME_END__*/

    function tickSingleInstruction() {
        for (let i = 0; i < phasesPerInstruction; i++) {
            const phase = clock;
            clkEl.style.setProperty("--clk", String(phase), "important");
            /*__WSS_KEEP_JS_COPROCESSOR_RUNTIME_START__*/
            if (phase === 2) {
                runCoprocessor(getComputedStyle(terminalEl));
            }
            /*__WSS_KEEP_JS_COPROCESSOR_RUNTIME_END__*/
            clock = (clock + 1) & 3;
            getComputedStyle(terminalEl).getPropertyValue("--_1pc");
        }
    }

    function runInstructionBatch(instructionCount) {
        let style = getComputedStyle(terminalEl);
        let pc = readPc(style);
        for (let i = 0; i < instructionCount; i++) {
            tickSingleInstruction();
            style = getComputedStyle(terminalEl);
            pc = readPc(style);
            if (!Number.isNaN(pc) && terminalPcs.has(pc)) {
                return { style, pc, halted: true };
            }
        }
        return { style, pc, halted: !Number.isNaN(pc) && terminalPcs.has(pc) };
    }

    function animate() {
        animationPending = false;
        if (halted) return;

        let instructionsThisFrame = 0;
        if (pendingStepCount > 0) {
            instructionsThisFrame = pendingStepCount;
            pendingStepCount = 0;
            paused = true;
        } else if (!paused) {
            speedCarry += speedMultiplier;
            instructionsThisFrame = Math.floor(speedCarry);
            speedCarry -= instructionsThisFrame;
        }

        let style = getComputedStyle(terminalEl);
        let pc = readPc(style);
        if (instructionsThisFrame > 0) {
            const batch = runInstructionBatch(instructionsThisFrame);
            style = batch.style;
            pc = batch.pc;
            halted = batch.halted;
        }

        if (followScreenBottom) {
            scrollScreenToBottom();
        }
        if (!Number.isNaN(pc) && terminalPcs.has(pc)) {
            halted = true;
        }
        if (halted) {
            paused = true;
        }
        refreshDebuggerLabels(style);
        if (!halted && (!paused || pendingStepCount > 0)) {
            scheduleAnimation();
        }
    }

    function clampSpeed(value) {
        if (!Number.isFinite(value)) return 1;
        return Math.min(maxSpeedMultiplier, Math.max(minSpeedMultiplier, value));
    }

    function initializeDebuggerPopup() {
        if (!jsClockDebuggerEnabled) return;

        const toggleBtn = document.createElement("button");
        toggleBtn.type = "button";
        toggleBtn.className = "wss-debug-trigger";
        toggleBtn.textContent = "Debugger";

        const popup = document.createElement("div");
        popup.className = "wss-debug-popup";
        popup.hidden = false;
        popup.innerHTML = `
            <div class="wss-debug-head">
                <h2 class="wss-debug-title">Step Debugger</h2>
                <button type="button" class="wss-debug-close" data-wss-debug-close="1">Close</button>
            </div>
            <label class="wss-debug-speed">
                Clock Speed
                <input class="wss-debug-range" type="range" min="${minSpeedMultiplier}" max="${maxSpeedMultiplier}" step="0.25" value="1" data-wss-debug-speed="1">
                <span class="wss-debug-speed-readout" data-wss-debug-speed-value="1">1x</span>
            </label>
            <div class="wss-debug-actions">
                <button type="button" class="wss-debug-btn" data-wss-debug-run="1">Run</button>
                <button type="button" class="wss-debug-btn" data-wss-debug-step="1">Step</button>
            </div>
            <dl class="wss-debug-stats">
                <div class="wss-debug-stat"><dt>State</dt><dd data-wss-debug-state="1">paused</dd></div>
                <div class="wss-debug-stat"><dt>PC</dt><dd data-wss-debug-pc="1">0</dd></div>
                <div class="wss-debug-stat"><dt>CLK</dt><dd data-wss-debug-clock="1">0</dd></div>
            </dl>
        `;

        document.body.append(toggleBtn, popup);

        const closeBtn = popup.querySelector("[data-wss-debug-close='1']");
        const speedInput = popup.querySelector("[data-wss-debug-speed='1']");
        debugSpeedOut = popup.querySelector("[data-wss-debug-speed-value='1']");
        debugRunBtn = popup.querySelector("[data-wss-debug-run='1']");
        debugStepBtn = popup.querySelector("[data-wss-debug-step='1']");
        debugStateOut = popup.querySelector("[data-wss-debug-state='1']");
        debugPcOut = popup.querySelector("[data-wss-debug-pc='1']");
        debugClockOut = popup.querySelector("[data-wss-debug-clock='1']");
        if (!(speedInput instanceof HTMLInputElement) || !closeBtn || !debugRunBtn || !debugStepBtn) {
            return;
        }

        toggleBtn.addEventListener("click", () => {
            popup.hidden = !popup.hidden;
        });
        closeBtn.addEventListener("click", () => {
            popup.hidden = true;
        });
        speedInput.addEventListener("input", () => {
            speedMultiplier = clampSpeed(Number.parseFloat(speedInput.value));
            if (debugSpeedOut) {
                debugSpeedOut.textContent = formatSpeedLabel(speedMultiplier);
            }
            if (!paused && !halted) {
                scheduleAnimation();
            }
        });
        debugRunBtn.addEventListener("click", () => {
            if (halted) return;
            paused = !paused;
            refreshDebuggerLabels(getComputedStyle(terminalEl));
            if (!paused) {
                scheduleAnimation();
            }
        });
        debugStepBtn.addEventListener("click", () => {
            if (halted) return;
            paused = true;
            pendingStepCount += 1;
            refreshDebuggerLabels(getComputedStyle(terminalEl));
            scheduleAnimation();
        });
    }

    clkEl.style.setProperty("--clk", "0", "important");
    scrollScreenToBottom();
    initializeDebuggerPopup();
    refreshDebuggerLabels(getComputedStyle(terminalEl));
    if (!paused) {
        scheduleAnimation();
    }
})();
</script>
<!--__WSS_KEEP_JS_CLOCK_RUNTIME_END__-->
</body>
