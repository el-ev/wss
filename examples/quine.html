.screen::after { white-space: pre-wrap; word-break: break-all; content: if(style(--pc: -1): var(--fb, "") "\a[Program exited with code " var(--ra, "0x00000000") "]"; style(--pc: -2): var(--fb, "") "\a[Trap: unreachable]"; style(--pc: -3): var(--fb, "") "\a[Trap: invalid memory access]"; style(--pc: -4): var(--fb, "") "\a[Trap: division by zero]"; style(--pc: -5): var(--fb, "") "\a[Trap: callstack overflow]"; style(--pc: -6): var(--fb, "") "\a[Trap: uncaught exception]"; else: var(--fb, "")); color: if(style(--pc: -2): #d00; style(--pc: -3): #d00; style(--pc: -4): #d00; style(--pc: -5): #d00; style(--pc: -6): #d00; else: #222); display: block; flex: 0 0 auto; }

</style>
</head>
<body>
<div class="unsupported">
The required CSS features are not supported by your browser.<br>
Please try an up-to-date Chromium-based browser.
</div>
<div class="clk" tabindex="0" style="outline: none;">
<div class="terminal">
<div class="screen"></div>
<div class="inds" aria-live="off">
    <div class="ind"><span class="k">PC</span><span id="ind-pc" class="v"></span></div>
    <div class="ind"><span class="k">SP</span><span id="ind-sp" class="v"></span></div>
    <div class="ind"><span class="k">G0</span><span id="ind-g0" class="v"></span></div>
</div>
<div class="csvis-frame"><div class="csvis"></div></div>
<div class="memvis-frame"><div class="memvis"></div></div>
</div>
</div>
<script>
(() => {
    const clkEl = document.querySelector(".clk");
    const terminalEl = document.querySelector(".terminal");
    const screenEl = document.querySelector(".screen");
    if (!clkEl || !terminalEl || !screenEl) return;

    let clock = 0;
    const phasesPerInstruction = 4;
    const terminalPcs = new Set([-1, -2, -3, -4, -5, -6]);
    const followSlackPx = 4;
    const minSpeedMultiplier = 0.01;
    const maxSpeedMultiplier = 16;
    const minSpeedLog = Math.log10(minSpeedMultiplier);
    const maxSpeedLog = Math.log10(maxSpeedMultiplier);
    let followScreenBottom = true;
    let speedMultiplier = 1;
    let speedCarry = 0;
    let pendingStepCount = 0;
    let paused = false;
    let halted = false;
    let animationPending = false;

    function isNearScreenBottom() {
        return screenEl.scrollHeight - screenEl.clientHeight - screenEl.scrollTop <= followSlackPx;
    }

    function scrollScreenToBottom() {
        screenEl.scrollTop = screenEl.scrollHeight;
    }

    screenEl.addEventListener(
        "scroll",
        () => {
            followScreenBottom = isNearScreenBottom();
        },
        { passive: true }
    );

    function readIntStyle(style, name, fallback = 0) {
        const parsed = Number.parseInt(style.getPropertyValue(name), 10);
        if (Number.isNaN(parsed)) return fallback;
        return parsed;
    }

    function formatSpeedLabel(value) {
        if (value < 0.1) return `${value.toFixed(3)}x`;
        if (value < 1) return `${value.toFixed(2)}x`;
        const rounded = Math.round(value * 100) / 100;
        return `${rounded.toFixed(rounded % 1 === 0 ? 0 : 2)}x`;
    }

    function readPc(style) {
        return readIntStyle(style, "--pc", readIntStyle(style, "--_1pc", 0));
    }




    function scheduleAnimation() {
        if (animationPending || halted) return;
        animationPending = true;
        requestAnimationFrame(animate);
    }


    function tickSingleInstruction() {
        for (let i = 0; i < phasesPerInstruction; i++) {
            const phase = clock;
            clkEl.style.setProperty("--clk", String(phase), "important");
            clock = (clock + 1) & 3;
            getComputedStyle(terminalEl).getPropertyValue("--_1pc");
        }
    }

    function runInstructionBatch(instructionCount) {
        let style = getComputedStyle(terminalEl);
        let pc = readPc(style);
        for (let i = 0; i < instructionCount; i++) {
            tickSingleInstruction();
            style = getComputedStyle(terminalEl);
            pc = readPc(style);
            if (!Number.isNaN(pc) && terminalPcs.has(pc)) {
                return { style, pc, halted: true };
            }
        }
        return { style, pc, halted: !Number.isNaN(pc) && terminalPcs.has(pc) };
    }

    function animate() {
        animationPending = false;
        if (halted) return;

        let instructionsThisFrame = 0;
        if (pendingStepCount > 0) {
            instructionsThisFrame = pendingStepCount;
            pendingStepCount = 0;
            paused = true;
        } else if (!paused) {
            speedCarry += speedMultiplier;
            instructionsThisFrame = Math.floor(speedCarry);
            speedCarry -= instructionsThisFrame;
        }

        let style = getComputedStyle(terminalEl);
        let pc = readPc(style);
        if (instructionsThisFrame > 0) {
            const batch = runInstructionBatch(instructionsThisFrame);
            style = batch.style;
            pc = batch.pc;
            halted = batch.halted;
        }

        if (followScreenBottom) {
            scrollScreenToBottom();
        }
        if (!Number.isNaN(pc) && terminalPcs.has(pc)) {
            halted = true;
        }
        if (halted) {
            paused = true;
        }
        if (!halted && (!paused || pendingStepCount > 0)) {
            scheduleAnimation();
        }
    }

    function clampSpeed(value) {
        if (!Number.isFinite(value)) return 1;
        return Math.min(maxSpeedMultiplier, Math.max(minSpeedMultiplier, value));
    }


    clkEl.style.setProperty("--clk", "0", "important");
    scrollScreenToBottom();
    if (!paused) {
        scheduleAnimation();
    }
})();
</script>
</body>
